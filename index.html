<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us 💙</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>💙 Our Talking Stage 💙</h1>
    <p>Answer honestly 😌✨</p>

    <form id="qaForm">

        <div class="question">
            <label>1️⃣ What was your first Impression of me?</label>
            <input type="text" name="q1" required>
        </div>

        <div class="question">
            <label>2️⃣ When did you start liking me?</label>
            <input type="text" name="q2" required>
        </div>

        <div class="question">
            <label>3️⃣ What makes me different?</label>
            <input type="text" name="q3" required>
        </div>

        <div class="question">
            <label>4️⃣ Your favorite memory with me?</label>
            <input type="text" name="q4">
        </div>

        <div class="question">
            <label>5️⃣ Do I make you smile? 😊</label>
            <input type="text" name="q5">
        </div>

        <div class="question">
            <label>6️⃣ One thing you want us to do together?</label>
            <input type="text" name="q6">
        </div>

        <div class="question">
            <label>7️⃣ Song that reminds you of me? 🎵</label>
            <input type="text" name="q7">
        </div>

        <div class="question">
            <label>8️⃣ What do you like most about me?</label>
            <input type="text" name="q8">
        </div>

        <div class="question">
            <label>9️⃣ Be honest — am I funny? 😂</label>
            <input type="text" name="q9">
        </div>

        <div class="question">
            <label>🔟 Where do you see this going?</label>
            <input type="text" name="q10">
        </div>

        <button type="submit">Send Answers 💌</button>

    </form>

    <p id="status"></p>
</div>

<script src="script.js"></script>
</body>
</html>
